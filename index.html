<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 2 — Fission</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #7a7a7a; width: 100vw; height: 100vh; overflow: hidden; cursor: none; }
  canvas { display: block; position: fixed; inset: 0; }

  /* Environment HUD */
  #hud {
    position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 32px; align-items: flex-end;
    z-index: 10; pointer-events: none;
  }
  .env-var {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .env-label {
    font-family: 'Courier New', monospace; font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  .env-bar-wrap {
    width: 60px; height: 3px; background: rgba(255,255,255,0.12);
    border-radius: 2px; overflow: hidden;
  }
  .env-bar {
    height: 100%; border-radius: 2px;
    transition: width 0.3s ease;
  }
  #bar-temp { background: rgba(255,160,80,0.7); }
  #bar-wind { background: rgba(160,220,255,0.7); }
  #bar-humid { background: rgba(180,255,180,0.7); }

  #title {
    position: fixed; top: 32px; left: 40px;
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.2em; color: rgba(255,255,255,0.22);
    text-transform: uppercase; z-index: 10; pointer-events: none;
  }
  #reset-btn {
    position: fixed; top: 28px; right: 36px;
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.22); background: none;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 6px 14px; cursor: pointer; transition: all 0.3s; z-index: 10;
  }
  #reset-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.35); }

  /* custom cursor */
  #cursor {
    position: fixed; pointer-events: none; z-index: 20;
    width: 12px; height: 12px;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width 0.2s, height 0.2s, border-color 0.2s;
  }
  #cursor.hot {
    width: 20px; height: 20px;
    border-color: rgba(255,160,80,0.7);
  }
</style>
</head>
<body>
<div id="title">Test 02 — Fission</div>
<div id="cursor"></div>
<canvas id="c"></canvas>
<button id="reset-btn" onclick="resetAll()">Clear</button>

<div id="hud">
  <div class="env-var">
    <div class="env-label">Temp</div>
    <div class="env-bar-wrap"><div class="env-bar" id="bar-temp" style="width:0%"></div></div>
  </div>
  <div class="env-var">
    <div class="env-label">Wind</div>
    <div class="env-bar-wrap"><div class="env-bar" id="bar-wind" style="width:0%"></div></div>
  </div>
  <div class="env-var">
    <div class="env-label">Humidity</div>
    <div class="env-bar-wrap"><div class="env-bar" id="bar-humid" style="width:0%"></div></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

const cursorEl   = document.getElementById('cursor');
const barTemp    = document.getElementById('bar-temp');
const barWind    = document.getElementById('bar-wind');
const barHumid   = document.getElementById('bar-humid');

// ── Environment state ──
const env = {
  mouseX: W/2, mouseY: H/2,
  speedX: 0,   speedY: 0,
  windX:  0,   windY:  0,   // smoothed wind
  temp:   0,   // 0–1, based on proximity to blobs
  wind:   0,   // 0–1, mouse speed
  humid:  0,   // 0–1, decays over time, boosted by click
  humidPoints: [], // [{x,y,r,strength}] moisture spots
};

let prevX = W/2, prevY = H/2;

// ── Palette ──
const COLORS = [
  [232,120,152],[240,128,80],[200,136,216],
  [240,100,100],[216,160,216],[245,160,100],
];
let colorIdx = 0;
function nextColor() { return COLORS[colorIdx++ % COLORS.length]; }

// ── Blob ──
const SCALE = 2;
let sw = Math.ceil(W/SCALE), sh = Math.ceil(H/SCALE);
let blobs = [];

class Blob {
  constructor(x, y, r, color) {
    this.x = x; this.y = y; this.r = r;
    this.baseR = r;
    this.color = color;
    this.vx = (Math.random()-.5)*.8;
    this.vy = (Math.random()-.5)*.8;
    this.wobble = Math.random()*Math.PI*2;
    this.wobbleSpeed = .007+Math.random()*.007;
    this.age = 0;
  }

  update() {
    this.age++;
    this.wobble += this.wobbleSpeed;

    // ── Temperature: proximity to mouse → speed multiplier ──
    const dx = this.x - env.mouseX, dy = this.y - env.mouseY;
    const distToMouse = Math.sqrt(dx*dx + dy*dy);
    const proximity   = Math.max(0, 1 - distToMouse / (Math.min(W,H)*0.45));
    const tempEffect  = 0.4 + proximity * 2.2; // 0.4 cold → 2.6 hot

    // ── Wind: push blobs in mouse movement direction ──
    this.vx += env.windX * 0.012;
    this.vy += env.windY * 0.012;

    // ── Base drift (scaled by temperature) ──
    this.vx += (Math.random()-.5) * 0.04 * tempEffect;
    this.vy += (Math.random()-.5) * 0.04 * tempEffect;
    this.vx *= (0.97 - proximity * 0.02); // more active = less damping
    this.vy *= (0.97 - proximity * 0.02);

    this.x += this.vx + Math.sin(this.wobble) * 0.15 * tempEffect;
    this.y += this.vy + Math.cos(this.wobble*.75) * 0.15 * tempEffect;

    // ── Humidity: directional growth toward moisture (hyphae extension) ──
    env.humidPoints.forEach(hp => {
      const hdx = this.x - hp.x, hdy = this.y - hp.y;
      const hd  = Math.sqrt(hdx*hdx + hdy*hdy);
      if (hd < hp.r * 3.5) {
        const influence = hp.strength * (1 - hd / (hp.r * 3.5));
        // strong directional pull — hyphae grow toward water source
        this.vx -= (hdx / (hd+1)) * influence * 0.18;
        this.vy -= (hdy / (hd+1)) * influence * 0.18;
      }
    });
    // radius stays close to base — only very slight swell
    const targetR = this.baseR * 1.0;
    this.r += (targetR - this.r) * 0.06;

    // boundary
    const pad = this.r*.5;
    if (this.x<pad)     { this.x=pad;     this.vx= Math.abs(this.vx)*.6; }
    if (this.x>W-pad)   { this.x=W-pad;   this.vx=-Math.abs(this.vx)*.6; }
    if (this.y<pad)     { this.y=pad;      this.vy= Math.abs(this.vy)*.6; }
    if (this.y>H-pad)   { this.y=H-pad;   this.vy=-Math.abs(this.vy)*.6; }

    // split if very hot + large
    if (proximity > 0.7 && this.r > 90 && Math.random() < 0.004 * proximity) {
      this.split();
    }
  }

  split() {
    const newR = this.r * 0.62;
    const count = 2+Math.floor(Math.random()*2);
    for (let i=0; i<count; i++) {
      const a = (i/count)*Math.PI*2+Math.random()*.5;
      const b = new Blob(
        this.x+Math.cos(a)*this.r*.4,
        this.y+Math.sin(a)*this.r*.4,
        newR, this.color
      );
      b.baseR = newR;
      b.vx = Math.cos(a)*(1.5+Math.random());
      b.vy = Math.sin(a)*(1.5+Math.random());
      blobs.push(b);
    }
    this.r = 0; // mark for removal
  }
}

// ── Render: per-pixel metaball with color blending ──
const BG = [122,122,122];

function render() {
  const img  = ctx.createImageData(W, H);
  const data = img.data;

  for (let py=0; py<sh; py++) {
    for (let px=0; px<sw; px++) {
      const wx = px*SCALE, wy = py*SCALE;
      let totalF=0, wR=0, wG=0, wB=0;

      for (const b of blobs) {
        const dx=wx-b.x, dy=wy-b.y, d2=dx*dx+dy*dy;
        const f=(b.r*b.r)/(d2+.001);
        totalF+=f;
        wR+=f*b.color[0]; wG+=f*b.color[1]; wB+=f*b.color[2];
      }

      let pr,pg,pb;
      const THRESH = 1.0;

      if (totalF >= THRESH) {
        pr=Math.min(255,wR/totalF);
        pg=Math.min(255,wG/totalF);
        pb=Math.min(255,wB/totalF);
      } else if (totalF >= THRESH*.5) {
        const t=(totalF-THRESH*.5)/(THRESH*.5);
        const et=t*t*(3-2*t);
        const br=Math.min(255,wR/Math.max(totalF,.001));
        const bg_=Math.min(255,wG/Math.max(totalF,.001));
        const bb=Math.min(255,wB/Math.max(totalF,.001));
        pr=BG[0]+(br-BG[0])*et;
        pg=BG[1]+(bg_-BG[1])*et;
        pb=BG[2]+(bb-BG[2])*et;
      } else {
        pr=BG[0]; pg=BG[1]; pb=BG[2];
      }

      for (let dy=0;dy<SCALE&&wy+dy<H;dy++) {
        for (let dx=0;dx<SCALE&&wx+dx<W;dx++) {
          const i=((wy+dy)*W+(wx+dx))*4;
          data[i]=pr; data[i+1]=pg; data[i+2]=pb; data[i+3]=255;
        }
      }
    }
  }
  ctx.putImageData(img,0,0);

  // draw humidity circles as subtle glow
  env.humidPoints.forEach(hp => {
    const grad = ctx.createRadialGradient(hp.x,hp.y,0,hp.x,hp.y,hp.r*2.5);
    grad.addColorStop(0,  `rgba(180,255,200,${hp.strength*.12})`);
    grad.addColorStop(1,  'rgba(180,255,200,0)');
    ctx.beginPath();
    ctx.arc(hp.x,hp.y,hp.r*2.5,0,Math.PI*2);
    ctx.fillStyle=grad;
    ctx.fill();
  });

  // draw temperature aura around mouse
  const tempGrad = ctx.createRadialGradient(env.mouseX,env.mouseY,0,env.mouseX,env.mouseY,Math.min(W,H)*.3);
  tempGrad.addColorStop(0,  `rgba(255,140,60,${env.temp*.08})`);
  tempGrad.addColorStop(1,  'rgba(255,140,60,0)');
  ctx.beginPath();
  ctx.arc(env.mouseX,env.mouseY,Math.min(W,H)*.3,0,Math.PI*2);
  ctx.fillStyle=tempGrad;
  ctx.fill();
}

// ── Mouse events ──
document.addEventListener('mousemove', e => {
  const dx = e.clientX - prevX, dy = e.clientY - prevY;
  const spd = Math.sqrt(dx*dx+dy*dy);

  env.mouseX = e.clientX; env.mouseY = e.clientY;
  env.speedX = dx; env.speedY = dy;

  // smooth wind
  env.windX += (dx - env.windX)*.15;
  env.windY += (dy - env.windY)*.15;
  env.wind   = Math.min(1, spd/30);

  prevX=e.clientX; prevY=e.clientY;

  // cursor heat
  cursorEl.style.left = e.clientX+'px';
  cursorEl.style.top  = e.clientY+'px';
});

document.addEventListener('click', e => {
  if (e.target.id==='reset-btn') return;

  // humidity burst at click
  env.humidPoints.push({
    x:e.clientX, y:e.clientY,
    r:60+Math.random()*40,
    strength:1.0,
  });

  // also spawn a small blob at click
  const color = nextColor();
  const r = 18+Math.random()*28;
  blobs.push(new Blob(e.clientX, e.clientY, r, color));

  // satellite blobs
  const n = 1+Math.floor(Math.random()*3);
  for (let i=0;i<n;i++) {
    const a=(i/n)*Math.PI*2+Math.random();
    const d=r*(1+Math.random()*.8);
    const sr=r*(.2+Math.random()*.4);
    const b=new Blob(e.clientX+Math.cos(a)*d, e.clientY+Math.sin(a)*d, sr, color);
    b.baseR=sr;
    blobs.push(b);
  }
});

window.resetAll = () => {
  blobs=[]; env.humidPoints=[]; colorIdx=0;
  env.humid=0; env.temp=0; env.wind=0;
};

// ── Loop ──
let frame=0;
function loop() {
  frame++;

  // decay wind
  env.windX *= .9; env.windY *= .9;
  env.wind  *= .95;

  // update humidity points (decay strength)
  env.humidPoints = env.humidPoints
    .map(hp=>({...hp, strength:hp.strength*.992}))
    .filter(hp=>hp.strength>.02);
  env.humid = Math.min(1, env.humidPoints.reduce((s,hp)=>s+hp.strength,0)/3);

  // update temp (based on blobs near mouse)
  const nearCount = blobs.filter(b=>{
    const dx=b.x-env.mouseX,dy=b.y-env.mouseY;
    return Math.sqrt(dx*dx+dy*dy)<Math.min(W,H)*.35;
  }).length;
  env.temp = Math.min(1, nearCount/8 + (1-Math.min(1,
    blobs.reduce((mn,b)=>{
      const dx=b.x-env.mouseX,dy=b.y-env.mouseY;
      return Math.min(mn,Math.sqrt(dx*dx+dy*dy));
    }, Infinity)/(Math.min(W,H)*.45)
  ))*.6);

  // update blobs
  blobs = blobs.filter(b=>b.r>2);
  blobs.forEach(b=>b.update());

  render();

  // HUD
  barTemp.style.width  = (env.temp*100)+'%';
  barWind.style.width  = (env.wind*100)+'%';
  barHumid.style.width = (env.humid*100)+'%';

  // cursor visual
  if (env.temp>.5) cursorEl.classList.add('hot');
  else cursorEl.classList.remove('hot');

  requestAnimationFrame(loop);
}

loop();

window.addEventListener('resize',()=>{
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  sw=Math.ceil(W/SCALE); sh=Math.ceil(H/SCALE);
});
</script>
</body>
</html>
